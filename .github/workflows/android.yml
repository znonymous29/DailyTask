name: Android Release

# 仅在推送 v* tag 时构建并发布 Release（推送 main 仅构建不发布）
on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  JAVA_VERSION: "17"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用环境 "android"，否则该环境下的 Secrets 不会注入
    environment: android
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: wrapper

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease
        # 目前 app/build.gradle 未启用 productFlavors，因此只有 assembleRelease / assembleDebug

      - name: Verify signing secrets and keystore
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SIGNING_KEY:-}" ] || [ -z "${ALIAS:-}" ] || [ -z "${KEY_STORE_PASSWORD:-}" ] || [ -z "${KEY_PASSWORD:-}" ]; then
            echo "Missing signing secrets. Please configure SIGNING_KEY, ALIAS, KEY_STORE_PASSWORD, KEY_PASSWORD in GitHub Actions secrets."
            exit 1
          fi

          echo "$SIGNING_KEY" | base64 -d > /tmp/signingKey.jks

          # Validate keystore is readable (JKS or PKCS12). This gives clearer errors than apksigner.
          if keytool -list -keystore /tmp/signingKey.jks -storepass "$KEY_STORE_PASSWORD" >/dev/null 2>&1; then
            echo "Keystore OK (default storetype)."
          elif keytool -list -storetype JKS -keystore /tmp/signingKey.jks -storepass "$KEY_STORE_PASSWORD" >/dev/null 2>&1; then
            echo "Keystore OK (JKS)."
          elif keytool -list -storetype PKCS12 -keystore /tmp/signingKey.jks -storepass "$KEY_STORE_PASSWORD" >/dev/null 2>&1; then
            echo "Keystore OK (PKCS12)."
          else
            echo "Keystore validation failed. Your SIGNING_KEY may not be a base64 of a .jks/.p12 file, or password is wrong."
            exit 1
          fi

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK for Release
        run: |
          SIGNED="${{ steps.sign_app.outputs.signedReleaseFile }}"
          if [ -f "$SIGNED" ]; then
            mv "$SIGNED" "DailyTask_${GITHUB_REF_NAME}.apk"
          fi

      # 仅在有 tag 时创建/更新 GitHub Release 并上传 APK
      - name: Create Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "DailyTask_*.apk"
          token: ${{ github.token }}
          generateReleaseNotes: true
